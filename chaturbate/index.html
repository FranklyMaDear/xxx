<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Chaturbate Page - Live Experience</title>
    <style>
        /* Basic reset and page styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 10px;
        }
        .container {
            max-width: 1800px;
            width: 100%;
        }
        .page-title {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        /* Grid για τα βίντεο - 2 στήλες */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            margin-bottom: 30px;
        }
        .video-item {
            display: flex;
            flex-direction: column;
            background: #16213e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #0f3460;
            transition: transform 0.2s ease;
        }
        .video-item:hover {
            transform: scale(1.01);
        }
        .iframe-wrapper {
            width: 100%;
            aspect-ratio: 850 / 480; /* Διατήρηση αναλογίας */
            background: #0a0f1f;
            position: relative;
        }
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0f1f;
        }
        .video-label {
            padding: 12px 16px;
            color: #ddd;
            font-size: 0.9rem;
            border-top: 1px solid #0f3460;
            background: #1a1a2e;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .mobile-note {
            display: none;
            text-align: center;
            color: #a8dadc;
            background: #0f3460;
            padding: 10px;
            border-radius: 50px;
            margin: 20px 0 10px;
            font-size: 0.9rem;
        }
        /* Responsive για κινητά */
        @media screen and (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr; /* Μία στήλη */
                gap: 30px;
            }
            .mobile-note {
                display: block;
            }
            .iframe-wrapper {
                aspect-ratio: 16/9;
            }
            .video-item:hover {
                transform: none;
            }
        }
        @media screen and (max-width: 480px) {
            .video-label {
                font-size: 0.8rem;
                padding: 10px;
            }
        }
        .footer-note {
            color: #6c757d;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid #0f3460;
            padding-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Grid δύο στηλών για τα πρώτα δύο βίντεο -->
        <div class="video-grid">

        <!-- THIRD VIDEO (NEW) - cbxyz με tour=nvfS -->

</body>
</html>
